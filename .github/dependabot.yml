version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Pacific/Auckland
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Pacific/Auckland
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
